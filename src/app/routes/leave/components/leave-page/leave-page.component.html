<!-- ── Page header ──────────────────────────────────────────────────────────── -->
<div class="page-header">

  <div class="page-header__left">
    <div class="page-header__breadcrumb">
      <span>Home</span>
      <mat-icon>chevron_right</mat-icon>
      <span>My Space</span>
      <mat-icon>chevron_right</mat-icon>
      <span class="active">Leave Request</span>
    </div>

    <div class="page-header__title">
      <h1>{{ activeTab === 0 ? 'Request Leave' : 'My Requests' }}</h1>
      <p>{{ activeTab === 0 ? 'Submit and track your time off requests' : 'Your leave history and request status' }}</p>
    </div>
  </div>

  <!-- Context-aware action button -->
  <div class="page-header__actions">
    <button mat-stroked-button
            *ngIf="activeTab === 0"
            (click)="goToRequests()">
      <mat-icon>list_alt</mat-icon>
      View My Requests
    </button>

    <button mat-stroked-button
            *ngIf="activeTab === 1"
            (click)="goToForm()">
      <mat-icon>add</mat-icon>
      New Request
    </button>
  </div>

</div>

<!-- ── Tab group ────────────────────────────────────────────────────────────── -->
<mat-card class="page-card">
  <mat-tab-group
    animationDuration="200ms"
    color="primary"
    [(selectedIndex)]="activeTab">

    <!-- Tab 0: Request Leave ──────────────────────────────────────────────── -->
    <mat-tab label="Request Leave">
      <div class="tab-body">
        <app-leave-request-form
          (submitted)="onLeaveSubmitted()"
          (drafted)="onDraftSaved()">
        </app-leave-request-form>
      </div>
    </mat-tab>

    <!-- Tab 1: My Requests ───────────────────────────────────────────────── -->
    <mat-tab label="My Requests">
      <div class="tab-body">
        <!--
          Balance cards are shown here (not above the tabs) because the
          request form already has a live balance sidebar.
          Seeing them on the history tab gives context without duplication.
        -->
        <app-leave-balance-cards class="m-b-20"></app-leave-balance-cards>
        <app-leave-history></app-leave-history>
      </div>
    </mat-tab>

  </mat-tab-group>
</mat-card>
