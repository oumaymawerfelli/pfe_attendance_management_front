<div class="page-header">
  <div class="page-header__left">
    <div class="page-header__breadcrumb">
      <span>Home</span>
      <mat-icon>chevron_right</mat-icon>
      <span>My Space</span>
      <mat-icon>chevron_right</mat-icon>
      <span class="active">{{ activeTabLabel }}</span>
    </div>
    <div class="page-header__title">
      <h1>{{ activeTabLabel }}</h1>
      <p>{{ activeTabSubtitle }}</p>
    </div>
  </div>

  <div class="page-header__actions">
    <button mat-stroked-button *ngIf="activeTab !== 2" (click)="activeTab = 2">
      <mat-icon>list_alt</mat-icon>
      View My Requests
    </button>
    <button mat-stroked-button *ngIf="activeTab === 2" (click)="activeTab = 0">
      <mat-icon>add</mat-icon>
      New Request
    </button>
  </div>
</div>

<mat-card class="page-card">
  <mat-tab-group animationDuration="200ms" color="primary" [(selectedIndex)]="activeTab">

    <!-- Tab 0: Request Leave -->
    <mat-tab label="Request Leave">
      <div class="tab-body">
        <app-leave-request-form
          (submitted)="onLeaveSubmitted()"
          (drafted)="onDraftSaved()">
        </app-leave-request-form>
      </div>
    </mat-tab>

    <!-- Tab 1: Exit Authorization ← NEW -->
    <mat-tab label="Exit Authorization">
      <div class="tab-body">
        <app-exit-authorization-form
          (submitted)="onExitSubmitted()">
        </app-exit-authorization-form>
      </div>
    </mat-tab>

    <!-- Tab 2: My Requests -->
    <mat-tab label="My Requests">
      <div class="tab-body">
        <app-leave-balance-cards class="m-b-20"></app-leave-balance-cards>
        <app-leave-history></app-leave-history>
      </div>
    </mat-tab>

  </mat-tab-group>
</mat-card>
