<div class="db-root">

  <!-- Welcome -->
  <div class="welcome">
    <div>
      <p class="welcome-greet">{{ greeting }},</p>
      <h1 class="welcome-name">
        {{ currentUser?.firstName }} {{ currentUser?.lastName }}
      </h1>
    </div>
    <span class="welcome-date">
      <mat-icon>calendar_today</mat-icon>
      {{ today | date:'EEEE, MMMM d, y' }}
    </span>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-center">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <ng-container *ngIf="!loading">

    <!-- KPI cards -->
    <div class="kpi-row">
      <div class="kpi-card" *ngFor="let k of kpis">
        <div class="kpi-label">{{ k.label }}</div>
        <div class="kpi-val">{{ k.value }}</div>
        <div class="kpi-sub">{{ k.sub }}</div>
      </div>
    </div>

    <!-- Donut chart -->
    <div class="chart-card">
      <div class="chart-title">Workforce by department</div>
      <div class="charts-inner">

        <div class="chart-wrap">
          <canvas id="donutChart"></canvas>
        </div>

        <div class="dept-legend">
          <div class="dept-row" *ngFor="let d of deptLabels; let i = index">
            <span class="leg-dot" [style.background]="deptColors[i]"></span>
            <span class="dept-name">{{ d }}</span>
            <span class="dept-count">{{ deptData[i] }}</span>
            <div class="dept-bar-wrap">
              <div class="dept-bar"
                   [style.width.%]="(deptData[i] / +kpis[0].value) * 100"
                   [style.background]="deptColors[i]">
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </ng-container>

</div>
