<!-- Floating Button -->
<button class="chat-fab" (click)="toggleChat()" [class.active]="isOpen">
  <span class="fab-icon" *ngIf="!isOpen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z" fill="currentColor"/>
      <circle cx="8" cy="12" r="1.2" fill="white"/>
      <circle cx="12" cy="12" r="1.2" fill="white"/>
      <circle cx="16" cy="12" r="1.2" fill="white"/>
    </svg>
  </span>
  <span class="fab-icon" *ngIf="isOpen">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </span>
  <span class="fab-pulse" *ngIf="!isOpen"></span>
</button>

<!-- Chat Window -->
<div class="chat-window" [class.open]="isOpen">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-info">
      <div class="bot-avatar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="6" width="18" height="14" rx="3" fill="currentColor" opacity="0.9"/>
          <circle cx="9" cy="13" r="2" fill="white"/>
          <circle cx="15" cy="13" r="2" fill="white"/>
          <path d="M9 4h6M12 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="bot-info">
        <span class="bot-name">Assistant IA</span>
        <span class="bot-status">
          <span class="status-dot"></span>
          Online
        </span>
      </div>
    </div>
    <div class="header-actions">
      <span class="pdf-badge" *ngIf="uploadedFileName" [title]="uploadedFileName">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/>
        </svg>
        PDF
      </span>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" #messagesContainer>
    <div
      class="message"
      *ngFor="let msg of messages"
      [class.user]="msg.role === 'user'"
      [class.assistant]="msg.role === 'assistant'"
    >
      <div class="msg-avatar" *ngIf="msg.role === 'assistant'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="6" width="18" height="14" rx="3" fill="currentColor"/>
          <circle cx="9" cy="13" r="2" fill="white"/>
          <circle cx="15" cy="13" r="2" fill="white"/>
        </svg>
      </div>
      <div class="msg-bubble">
        <p class="msg-text">{{ msg.content }}</p>
        <span class="msg-time">{{ formatTime(msg.timestamp) }}</span>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="message assistant" *ngIf="isTyping">
      <div class="msg-avatar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="6" width="18" height="14" rx="3" fill="currentColor"/>
          <circle cx="9" cy="13" r="2" fill="white"/>
          <circle cx="15" cy="13" r="2" fill="white"/>
        </svg>
      </div>
      <div class="msg-bubble typing-bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <!-- Upload indicator -->
    <div class="upload-indicator" *ngIf="isUploading">
      <div class="upload-spinner"></div>
      <span>Indexation du PDF en cours...</span>
    </div>
  </div>

  <!-- Input Area -->
  <div class="chat-input-area">
    <input
      type="file"
      #fileInput
      accept=".pdf"
      (change)="onFileSelected($event)"
      style="display: none"
    />

    <button class="upload-btn" (click)="triggerFileUpload()" [disabled]="isUploading" title="Uploader un PDF">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M14 2v6h6M12 12v6M9 15l3-3 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <textarea
      class="chat-input"
      [(ngModel)]="userInput"
      (keydown)="onKeyDown($event)"
      placeholder="Ask your HR question..."
      rows="1"
      [disabled]="isTyping"
    ></textarea>

    <button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim() || isTyping">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div>
