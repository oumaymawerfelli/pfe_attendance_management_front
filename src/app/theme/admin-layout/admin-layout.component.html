<div class="matero-container-wrap"
     [class.matero-sidenav-collapsed]="options.sidenavCollapsed && options.navPos !== 'top'"
     [class.matero-navbar-side]="options.navPos === 'side'"
     [class.matero-navbar-top]="options.navPos === 'top'"
     [class.matero-header-above]="options.headerPos === 'above'"
     [class.matero-header-fixed]="options.headerPos === 'fixed'"
     [class.matero-header-white]="themeColor !== 'dark'"
     [attr.dir]="options.dir">
  
  <ng-progress></ng-progress>

  <!-- Header above sidenav (positioned outside mat-sidenav-container) -->
  <app-header *ngIf="options.showHeader && options.headerPos === 'above'"
              class="app-header-above"
              (toggleSidenav)="toggleCollapsed()"
              (toggleSidenavNotice)="sidenavNotice.toggle()"
              [showBranding]="true">
  </app-header>

  <mat-sidenav-container class="matero-container" 
                         [class.has-header-above]="options.showHeader && options.headerPos === 'above'"
                         [class.has-header-fixed]="options.showHeader && options.headerPos === 'fixed'">
    
    <!-- Main navigation sidenav -->
    <mat-sidenav #sidenav 
                 class="matero-sidenav"
                 [mode]="isOver ? 'over' : 'side'"
                 [opened]="isMainSidenavOpen()"
                 (openedChange)="onSidenavOpenedChange($event)"
                 (closedStart)="onSidenavClosedStart()">
      <app-sidebar [showToggle]="!isOver"
                   [showUser]="!!options.showUserPanel"
                   [showHeader]="options.headerPos !== 'above'"
                   (toggleCollapsed)="toggleCollapsed()"
                   [toggleChecked]="!!options.sidenavCollapsed">
      </app-sidebar>
    </mat-sidenav>

    <!-- Notice panel (right side) -->
    <mat-sidenav #sidenavNotice 
                 position="end" 
                 mode="over"
                 class="notice-sidenav">
      <app-sidebar-notice></app-sidebar-notice>
    </mat-sidenav>

    <!-- Main content area -->
    <mat-sidenav-content #content class="matero-content-wrap">
      <!-- Header inside content (for side navigation layout) -->
      <app-header *ngIf="options.showHeader && options.headerPos !== 'above'"
                  class="app-header-inline"
                  [class.app-header-fixed]="options.headerPos === 'fixed'"
                  [showToggle]="shouldShowToggle()"
                  [showBranding]="options.navPos === 'top'"
                  (toggleSidenav)="toggleCollapsed()"
                  (toggleSidenavNotice)="sidenavNotice.toggle()">
      </app-header>

      <!-- Top navigation menu -->
      <app-topmenu *ngIf="options.navPos === 'top'"
                   class="app-topmenu">
      </app-topmenu>

      <!-- Main content with proper spacing -->
      <div class="matero-content"
           [class.has-fixed-header]="options.showHeader && options.headerPos === 'fixed' && options.navPos !== 'top'"
           [class.has-top-menu]="options.navPos === 'top'">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>

  <!-- Theme customizer -->
  <app-customizer (optionsChange)="updateOptions($event)"></app-customizer>
</div>
