<div class="matero-sidebar-header" *ngIf="showHeader">
  <app-branding></app-branding>
  <mat-slide-toggle *ngIf="showToggle" hideIcon
                    [checked]="toggleChecked"
                    (change)="toggleCollapsed.emit()">
  </mat-slide-toggle>
</div>

<div class="matero-sidebar-main scrollbar-none">
  <!-- User info only (no logout) -->
  <app-user-panel *ngIf="showUser"></app-user-panel>

  <!-- Nav menu — scrollable -->
  <div class="matero-sidebar-menu">
    <app-sidemenu [ripple]="showToggle"></app-sidemenu>
  </div>
</div>

<!-- Logout pinned to bottom -->
<div class="matero-sidebar-footer">
  <a class="sidebar-logout" (click)="logout()" matRipple>
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </a>
</div>
