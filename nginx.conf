server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1000;

    # ✅ Proxy API → backend
    location /api/ {
        proxy_pass http://backend-app:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }

    # ✅ NOUVEAU : Proxy uploads (avatars) → backend
    # Le "^~" force la priorité sur la regex \.jpg$ ci-dessous
    location ^~ /uploads/ {
        proxy_pass http://backend-app:8080/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cache des images
        expires 7d;
        add_header Cache-Control "public";
    }

    # Angular SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets Angular (avec hash dans le nom du fichier → immutable safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}